name: Merge dev_dbx to master

on:
  push:
    branches:
      - dev_dbx

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Checkout master
        run: |
          git fetch origin
          git checkout master

      - name: Merge dev_dbx into master
        run: |
          git merge origin/dev_dbx --no-ff -m "Merge branch 'dev_dbx' into master"

      - name: Push master
        run: |
          git push origin master
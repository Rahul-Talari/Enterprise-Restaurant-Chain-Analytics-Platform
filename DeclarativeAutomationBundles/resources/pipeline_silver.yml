resources:
  pipelines:
    pipeline_silver:
      name: restaurant_chain_analytics_silver
      description: "Transforms Bronze data into Silver layer - SCD Type 2 dimensions, fact orders, fact order items, and AI-enriched reviews"
      catalog: ${var.catalog}
      target: 02_silver
      serverless: true
      libraries:
        - file:
            path: ../sources/2_transformation_bronze_to_silver/transformations/dimensional_tables.py
        - file:
            path: ../sources/2_transformation_bronze_to_silver/transformations/fact_orders.py
        - file:
            path: ../sources/2_transformation_bronze_to_silver/transformations/fact_order_items.py
        - file:
            path: ../sources/2_transformation_bronze_to_silver/transformations/fact_reviews.sql

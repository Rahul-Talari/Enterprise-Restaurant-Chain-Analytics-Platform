resources:
  jobs:
    job_restaurant_analytics:
      name: restaurant_chain_analytics_pipeline
      description: "Scheduled job that triggers Silver and Gold pipeline updates. Bronze runs continuously and is excluded."

      schedule:
        quartz_cron_expression: "0 0 1 * * ?"
        timezone_id: "UTC"

      tasks:
        - task_key: silver_transformation
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_silver.id}

        - task_key: gold_aggregation
          depends_on:
            - task_key: silver_transformation
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_gold.id}

      email_notifications:
        on_failure:
          - rohitkadali2003@outlook.com
